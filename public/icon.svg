<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Hintergrund -->
  <rect width="512" height="512" rx="128" fill="#0f766e"/>
  
  <!-- Boden -->
  <rect x="32" y="416" width="448" height="64" rx="16" fill="#115e59"/>
  
  <!-- Linker Zelt-Pfosten -->
  <rect x="112" y="176" width="24" height="256" rx="4" fill="#fef3c7"/>
  
  <!-- Rechter Zelt-Pfosten -->
  <rect x="376" y="176" width="24" height="256" rx="4" fill="#fef3c7"/>
  
  <!-- Mittlerer Pfosten (hinter dem Eingang) -->
  <rect x="244" y="80" width="24" height="352" rx="4" fill="#fde68a"/>
  
  <!-- Zelt-Dach links -->
  <path d="M124 176 L256 48 L256 176 Z" fill="#f0fdfa"/>
  
  <!-- Zelt-Dach rechts -->
  <path d="M388 176 L256 48 L256 176 Z" fill="#ccfbf1"/>
  
  <!-- Zelt-Seitenwand links -->
  <path d="M124 176 L124 416 L256 416 L256 176 Z" fill="#f0fdfa"/>
  
  <!-- Zelt-Seitenwand rechts -->
  <path d="M388 176 L388 416 L256 416 L256 176 Z" fill="#ccfbf1"/>
  
  <!-- Eingang (dunkler Bereich) -->
  <path d="M192 416 L192 256 L256 160 L320 256 L320 416 Z" fill="#134e4a"/>
  
  <!-- Eingang Innenraum -->
  <path d="M210 416 L210 270 L256 208 L302 270 L302 416 Z" fill="#0f766e"/>
  
