  <!-- Kleine Fahne auf dem Zelt -->
  <line x1="256" y1="48" x2="256" y2="24" stroke="#fde68a" stroke-width="4" stroke-linecap="round"/>
  <path d="M256 24 L290 36 L256 48 Z" fill="#ef4444"/>
  
  <!-- Sonne -->
